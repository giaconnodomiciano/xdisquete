<!DOCTYPE html>


<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>KYC - Nuclea 🔦</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&amp;family=DM+Mono:wght@300;400;500&amp;family=Playfair+Display:wght@600;700&amp;display=swap" rel="stylesheet"/>
<script defer="" src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<style>
  :root {
    --bg:        #0b0f19;
    --bg2:       #111827;
    --bg3:       #1a2234;
    --border:    #1e2d45;
    --border2:   #253554;
    --text:      #e8edf5;
    --muted:     #6b7fa3;
    --muted2:    #4a5a7a;
    --muted3:    #2e3d58;
    --purple:    #1e6bdc;
    --purple2:   #4d9bff;
    --green:     #10c28a;
    --amber:     #f0a734;
    --red:       #e85555;
    --blue:      #3b82f6;
    --cyan:      #06c7e8;
    --font:      'DM Sans', sans-serif;
    --mono:      'DM Mono', monospace;
    --display:   'Playfair Display', serif;

    /* ── Escala tipográfica corporativa ── */
    --t-2xs:  .55rem;   /* 8.8px  — micro labels */
    --t-xs:   .625rem;  /* 10px   — captions, badges */
    --t-sm:   .6875rem; /* 11px   — labels, subtítulos */
    --t-base: .75rem;   /* 12px   — corpo de texto */
    --t-md:   .8125rem; /* 13px   — texto principal */
    --t-lg:   .9375rem; /* 15px   — títulos de seção */
    --t-xl:   1.125rem; /* 18px   — títulos de página */
    --t-2xl:  1.5rem;   /* 24px   — KPI principal */
    --t-3xl:  2rem;     /* 32px   — score destacado */

    /* ── Pesos ── */
    --w-light:    300;
    --w-regular:  400;
    --w-medium:   500;
    --w-semibold: 600;
    --w-bold:     700;
    --w-extrabold:800;
    --w-black:    900;

    /* ── Letter-spacing ── */
    --ls-tight:  -.02em;
    --ls-normal:  0;
    --ls-wide:    .04em;
    --ls-wider:   .08em;
    --ls-widest:  .14em;
  }

  [data-theme="light"] {
    --bg:        #f0f4fa;
    --bg2:       #ffffff;
    --bg3:       #e8eef7;
    --border:    #d0daea;
    --border2:   #b8c8de;
    --text:      #0f1f3d;
    --muted:     #4a6080;
    --muted2:    #7a96b8;
    --muted3:    #a8bed8;
    --purple:    #1057c8;
    --purple2:   #2870e0;
    --green:     #0a9e6e;
    --amber:     #d68a1a;
    --red:       #cc3333;
  }

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:var(--font);
    font-size:14px;
    font-weight:var(--w-regular);
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    overflow-x:hidden; overflow-y:auto;
    letter-spacing:var(--ls-normal);
    transition: background .25s, color .25s;
  }


  /* ── LOGO THEME SWITCH ── */
  .logo-dark  { display: block !important; }
  .logo-light { display: none  !important; }
  [data-theme="light"] .logo-dark  { display: none  !important; }
  [data-theme="light"] .logo-light { display: block !important; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar{width:4px;height:4px;}
  ::-webkit-scrollbar-track{background:var(--bg2);}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}

  /* ── APP SHELL ── */
  #app{display:flex;height:100vh;width:100vw;}

  /* ── SIDEBAR ── */
  #sidebar{
    width:220px;min-width:220px;background:var(--bg2);
    border-right:1px solid var(--border);
    display:flex;flex-direction:column;
    transition:transform .3s ease;z-index:100;overflow-y:auto;
  }
  .sb-logo{
    padding:1.4rem 1.2rem;
    border-bottom:1px solid var(--border);
    text-align:center;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .sb-logo img{
    width:100%;
    max-width:160px;
    background:transparent;
    border-radius:5px;
    padding:4px 6px;
    display:block;
  }
  .sb-logo .sb-badge{ display:none; }
  .sb-section{
    font-size:.6rem;
    font-weight:var(--w-black);
    color:var(--muted3);
    letter-spacing:var(--ls-widest);
    text-transform:uppercase;
    padding:.9rem 1rem .35rem;
    border-top:1px solid var(--border);
  }
  .sb-section:first-of-type{border-top:none;}
  .sb-filter-label{
    font-size:.6rem;
    font-weight:var(--w-bold);
    color:var(--muted2);
    letter-spacing:var(--ls-wider);
    text-transform:uppercase;
    padding:.3rem 1rem .15rem;
  }
  .sb-select,.sb-input{
    width:calc(100% - 2rem);margin:0 1rem .5rem;
    background:var(--bg3);border:1px solid var(--border2);
    border-radius:6px;color:var(--text);font-size:.7rem;
    padding:.35rem .55rem;font-family:var(--font);outline:none;
    transition:border-color .2s;
  }
  .sb-select:focus,.sb-input:focus{border-color:var(--purple);}
  .sb-select option{background:var(--bg3);}
  .sb-footer{
    margin-top:auto;padding:1rem;
    border-top:1px solid var(--border);
    font-size:var(--t-xs);
    color:var(--muted2);
    font-weight:var(--w-medium);
  }
  .sb-footer b{color:var(--purple2);font-weight:var(--w-semibold);}
  .sb-logout{
    margin-top:.6rem;width:100%;
    background:transparent;
    border:1px solid var(--border2);
    border-radius:4px;
    color:var(--red);
    font-size:var(--t-2xs);
    font-weight:var(--w-bold);
    letter-spacing:var(--ls-wider);
    text-transform:uppercase;
    font-family:var(--font);
    padding:.35rem .6rem;
    cursor:pointer;
    transition:background .2s;
  }
  .sb-logout:hover{background:rgba(239,68,68,.1);}

  /* ── MAIN ── */
  #main{flex:1;display:flex;flex-direction:column;overflow-x:hidden; overflow-y:auto;}

  /* ── TOPBAR ── */
  #topbar{
    background:var(--bg2);border-bottom:1px solid var(--border2);
    padding:.7rem 1.8rem;display:flex;align-items:center;gap:1rem;
    flex-shrink:0;min-height:54px;justify-content:center;position:relative;
  }
  .tb-title{
    font-size:1.05rem;
    font-weight:var(--w-bold);
    color:var(--text);
    letter-spacing:var(--ls-tight);
    line-height:1.15;
    min-width:180px;
  }
  .tb-sub{
    font-size:.62rem;
    color:var(--muted2);
    font-weight:var(--w-medium);
    letter-spacing:var(--ls-wide);
    text-transform:uppercase;
    margin-top:3px;
  }
  .nav-tabs{display:flex;gap:.1rem;}
  .nav-tab{
    background:transparent;
    border:none;
    border-bottom:2.5px solid transparent;
    border-radius:0;
    color:var(--muted);
    font-size:.72rem;
    font-weight:var(--w-semibold);
    font-family:var(--font);
    padding:.5rem 1.2rem;
    cursor:pointer;
    transition:all .18s;
    letter-spacing:var(--ls-wider);
    text-transform:uppercase;
    white-space:nowrap;
    display:inline-flex;
    align-items:center;
    gap:.45rem;
  }
  .nav-tab svg{flex-shrink:0;opacity:.8;}
  .nav-tab.active svg{opacity:1;}
  .nav-tab:hover{color:var(--purple2);border-bottom-color:var(--purple);}
  .nav-tab.active{
    color:var(--purple2);
    border-bottom-color:var(--purple);
    font-weight:var(--w-bold);
  }
  .tb-spacer{flex:1;}
  .tb-user{text-align:right;}
  .tb-user .name{
    font-size:.72rem;
    color:var(--purple2);
    font-weight:var(--w-semibold);
    letter-spacing:var(--ls-normal);
  }
  .tb-user .time{
    font-size:.62rem;
    color:var(--muted2);
    margin-top:2px;
    font-family:var(--mono);
    font-weight:var(--w-light);
    letter-spacing:.03em;
  }

  /* ── CONTENT ── */
  #content{flex:1;overflow-y:auto;padding:1.4rem 1.8rem 2rem;}

  /* ── CARDS ── */
  .stat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:.8rem;margin-bottom:1.4rem;}
  .stat-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:.8rem;margin-bottom:1rem;}
  .stat-grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:.8rem;margin-bottom:1rem;}
  .stat-card{
    background:var(--bg2);border:1px solid var(--border);
    border-radius:6px;padding:1.1rem 1.3rem;min-height:110px;
    position:relative;overflow-x:hidden; overflow-y:auto;
  }
  .stat-card::before{
    content:'';display:block;height:2px;
    position:absolute;top:0;left:0;right:0;
    border-radius:12px 12px 0 0;
  }
  .stat-card.purple::before{background:linear-gradient(90deg,#7c3aed,#a78bfa);}
  .stat-card.green::before {background:linear-gradient(90deg,#059669,#34d399);}
  .stat-card.amber::before {background:linear-gradient(90deg,#d97706,#fbbf24);}
  .stat-card.red::before   {background:linear-gradient(90deg,#dc2626,#f87171);}
  .stat-card.blue::before  {background:linear-gradient(90deg,#1d4ed8,#60a5fa);}
  .stat-card.cyan::before  {background:linear-gradient(90deg,#0891b2,#22d3ee);}
  .sc-label{
    font-size:var(--t-2xs);
    font-weight:var(--w-black);
    color:var(--muted2);
    letter-spacing:var(--ls-widest);
    text-transform:uppercase;
    margin-bottom:.5rem;
    display:flex;
    align-items:center;
    gap:.4rem;
  }
  .sc-icon{
    display:inline-flex;
    align-items:center;
    opacity:.7;
    flex-shrink:0;
  }
  .sc-icon svg{display:block;}
  .sc-val{
    font-size:var(--t-2xl);
    font-weight:var(--w-extrabold);
    color:var(--text);
    line-height:1.05;
    letter-spacing:var(--ls-tight);
  }
  .sc-sub{
    font-size:var(--t-2xs);
    color:var(--muted2);
    font-weight:var(--w-medium);
    margin-top:.25rem;
    letter-spacing:var(--ls-wide);
  }
  .sc-trend-up{
    font-size:var(--t-2xs);
    font-weight:var(--w-semibold);
    color:var(--green);
    margin-top:.2rem;
    letter-spacing:var(--ls-normal);
  }
  .sc-trend-down{
    font-size:var(--t-2xs);
    font-weight:var(--w-semibold);
    color:var(--red);
    margin-top:.2rem;
    letter-spacing:var(--ls-normal);
  }

  /* ── CHART CARD ── */
  .chart-card{
    background:var(--bg2);border:1px solid var(--border);
    border-radius:6px;padding:1rem 1.25rem;
  }
  .chart-title{
    font-size:.62rem;
    font-weight:var(--w-black);
    color:var(--muted2);
    letter-spacing:var(--ls-wider);
    text-transform:uppercase;
    margin-bottom:.65rem;
    border-bottom:1px solid var(--border);
    padding-bottom:.45rem;
  }
  .chart-row{display:grid;gap:.8rem;margin-bottom:.8rem;}
  .chart-row-2{grid-template-columns:1fr 1fr;}
  .chart-row-12{grid-template-columns:1.1fr 2fr;}
  .chart-row-3{grid-template-columns:1fr 1fr 1fr;}

  /* ── GRAD DIV ── */
  .grad-div{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:.9rem 0;}

  /* ── PROGRESS BARS ── */
  .pbar{margin-bottom:.5rem;}
  .pbar-row{display:flex;justify-content:space-between;font-size:.65rem;margin-bottom:3px;}
  .pbar-lbl{
    color:var(--muted);
    font-size:var(--t-xs);
    font-weight:var(--w-medium);
    letter-spacing:var(--ls-wide);
  }
  .pbar-val{
    font-weight:var(--w-bold);
    font-size:var(--t-xs);
    font-family:var(--mono);
    letter-spacing:var(--ls-normal);
  }
  .pbar-bg{background:var(--bg3);border-radius:99px;height:4px;}
  .pbar-fill{height:4px;border-radius:99px;}

  /* ── BLOCO ── */
  .bloco{
    background:var(--bg3);border-radius:8px;border-left:3px solid;
    padding:.65rem .9rem;margin-bottom:.5rem;
  }
  .bloco-lbl{
    font-size:var(--t-2xs);
    font-weight:var(--w-black);
    text-transform:uppercase;
    letter-spacing:var(--ls-widest);
    margin-bottom:.22rem;
  }
  .bloco-val{
    font-size:var(--t-md);
    font-weight:var(--w-bold);
    color:var(--text);
    word-break:break-word;
    letter-spacing:var(--ls-tight);
    line-height:1.3;
  }
  .bloco-sub{
    font-size:var(--t-2xs);
    color:var(--muted2);
    font-weight:var(--w-medium);
    margin-top:.15rem;
    letter-spacing:var(--ls-wide);
  }

  /* ── TABLE ── */
  .tbl-wrap{overflow:auto;max-height:220px;border-radius:8px;}
  table{width:100%;border-collapse:collapse;font-size:.68rem;}
  thead th{
    background:var(--bg3);
    color:var(--muted2);
    font-size:var(--t-2xs);
    font-weight:var(--w-black);
    letter-spacing:var(--ls-widest);
    text-transform:uppercase;
    padding:.6rem .9rem;
    text-align:left;
    position:sticky;top:0;z-index:2;
    border-bottom:1px solid var(--border2);
  }
  tbody tr{border-bottom:1px solid var(--border);}
  tbody tr:hover{background:var(--bg3);}
  tbody td{
    padding:.52rem .9rem;
    color:var(--text);
    font-size:var(--t-xs);
    font-weight:var(--w-medium);
  }
  .badge{
    display:inline-block;
    padding:3px 10px;
    border-radius:4px;
    font-size:var(--t-2xs);
    font-weight:var(--w-bold);
    letter-spacing:var(--ls-wide);
    text-transform:uppercase;
  }
  .badge-green{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.25);}
  .badge-amber{background:rgba(251,191,36,.12);color:var(--amber);border:1px solid rgba(251,191,36,.25);}
  .badge-red  {background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.25);}

  /* ── HEADER EMPRESA ── */
  .emp-header{
    background:var(--bg2);border:1px solid var(--border);
    border-radius:12px;padding:1rem 1.4rem;margin-bottom:.8rem;
    display:flex;align-items:center;justify-content:space-between;
    border-left:4px solid;
  }
  .eh-left .eh-tag{
    font-size:var(--t-2xs);
    font-weight:var(--w-black);
    text-transform:uppercase;
    letter-spacing:var(--ls-widest);
    margin-bottom:.25rem;
  }
  .eh-left .eh-cnpj{
    font-size:var(--t-base);
    font-weight:var(--w-semibold);
    color:var(--text);
    font-family:var(--mono);
    letter-spacing:.03em;
  }
  .eh-right{display:flex;align-items:center;gap:1rem;}
  .eh-score-val{font-size:1.75rem;font-weight:800;color:var(--text);line-height:1;}
  .eh-score-lbl{font-size:.55rem;color:var(--muted2);}
  .signal-badge{
    padding:5px 14px;
    border-radius:4px;
    font-size:var(--t-2xs);
    font-weight:var(--w-black);
    letter-spacing:var(--ls-wider);
    text-transform:uppercase;
    border:1.5px solid;
  }

  /* ── FILTER ROW ── */
  .filter-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:.8rem;margin-bottom:.8rem;}
  .filter-row select,.filter-row input{
    width:100%;background:var(--bg2);border:1px solid var(--border2);
    border-radius:8px;color:var(--text);font-size:.72rem;padding:.4rem .6rem;
    font-family:var(--font);outline:none;transition:border-color .2s;
  }
  .filter-row select:focus,.filter-row input:focus{border-color:var(--purple);}
  .filter-row label{font-size:.56rem;font-weight:700;color:var(--muted2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:.2rem;display:block;}

  /* ── EMPTY STATE ── */
  .empty-state{
    background:var(--bg2);border:1px dashed var(--border2);border-radius:14px;
    padding:4rem;text-align:center;margin-top:1.5rem;
  }
  .empty-state .icon{font-size:3rem;margin-bottom:.8rem;}
  .empty-state h3{
    font-size:var(--t-lg);
    font-weight:var(--w-bold);
    color:var(--text);
    letter-spacing:var(--ls-tight);
    margin-bottom:.4rem;
  }
  .empty-state p{
    font-size:var(--t-sm);
    color:var(--muted2);
    font-weight:var(--w-medium);
    letter-spacing:var(--ls-normal);
  }

  /* ── LOGIN ── */
  #login-overlay{
    position:fixed;inset:0;background:var(--bg);
    display:flex;align-items:center;justify-content:center;z-index:1000;
  }
  .login-box{
    background:var(--bg2);border:1px solid var(--border);
    border-radius:16px;padding:2.2rem;width:340px;
    box-shadow:0 24px 64px rgba(0,0,0,.6);
  }
  .login-logo{text-align:center;margin-bottom:1.5rem;}
  .login-logo img{max-width:240px;width:100%;border-radius:6px;background:transparent;display:block;margin:0 auto;}
  .login-logo .badge{
    font-size:var(--t-2xs);
    color:var(--muted3);
    font-weight:var(--w-black);
    letter-spacing:var(--ls-widest);
    text-transform:uppercase;
    margin-top:.55rem;
    display:block;
  }
  .login-title{
    font-size:var(--t-xl);
    font-weight:var(--w-extrabold);
    color:var(--text);
    letter-spacing:var(--ls-tight);
    margin-bottom:.25rem;
    text-align:center;
  }
  .login-sub{
    font-size:var(--t-xs);
    color:var(--muted2);
    font-weight:var(--w-medium);
    letter-spacing:var(--ls-wide);
    margin-bottom:1.5rem;
    text-align:center;
  }
  .lbl{
    font-size:var(--t-2xs);
    font-weight:var(--w-black);
    color:var(--muted2);
    letter-spacing:var(--ls-widest);
    text-transform:uppercase;
    margin-bottom:.28rem;
    display:block;
  }
  .login-box input{
    width:100%;background:var(--bg3);border:1px solid var(--border2);
    border-radius:8px;color:var(--text);font-family:var(--font);
    font-size:.8rem;padding:.5rem .8rem;outline:none;
    margin-bottom:.9rem;transition:border-color .2s;
  }
  .login-box input:focus{border-color:var(--purple);}
  .login-btn{
    width:100%;
    background:linear-gradient(135deg,#6d28d9,#4c1d95);
    color:#fff;
    border:none;
    border-radius:6px;
    padding:.65rem 1rem;
    font-size:var(--t-xs);
    font-weight:var(--w-black);
    letter-spacing:var(--ls-wider);
    text-transform:uppercase;
    font-family:var(--font);
    cursor:pointer;
    transition:all .2s;
  }
  .login-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(109,40,217,.45);}
  .login-err{font-size:.68rem;color:var(--red);margin-top:.5rem;text-align:center;}
  .login-footer{font-size:.62rem;color:var(--muted3);text-align:center;margin-top:.9rem;}

  /* ── GAUGES ROW ── */
  .gauges-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin:.4rem 0;}

  /* ── EXPANDER / JSON ── */
  .json-toggle{
    font-size:var(--t-2xs);
    font-weight:var(--w-bold);
    letter-spacing:var(--ls-wider);
    text-transform:uppercase;
    color:var(--muted);
    cursor:pointer;
    background:var(--bg3);
    border:1px solid var(--border);
    border-radius:4px;
    padding:.38rem .75rem;
    margin-top:.5rem;
    width:100%;
    text-align:left;
    font-family:var(--font);
    transition:background .2s;
  }
  .json-toggle:hover{background:var(--border);}
  .xf-chip{
    display:inline-flex;align-items:center;gap:.3rem;
    background:rgba(109,40,217,.18);color:var(--purple2);
    border:1px solid rgba(109,40,217,.4);border-radius:4px;
    font-size:var(--t-2xs);font-weight:var(--w-bold);
    letter-spacing:var(--ls-wide);text-transform:uppercase;
    padding:.2rem .6rem;cursor:pointer;transition:background .15s;font-family:var(--font);
  }
  .xf-chip:hover{background:rgba(109,40,217,.32);}
  .json-body{
    background:var(--bg);border:1px solid var(--border);
    border-radius:8px;padding:.8rem;font-family:var(--mono);
    font-size:.6rem;color:var(--muted);margin-top:.3rem;
    max-height:160px;overflow:auto;display:none;
    white-space:pre-wrap;word-break:break-all;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .page-anim{animation:fadeIn .25s ease both;}

  /* ── RESPONSIVE ── */
  @media(max-width:900px){
    .stat-grid{grid-template-columns:repeat(2,1fr);}
    .chart-row-12,.chart-row-3,.chart-row-2{grid-template-columns:1fr;}
  }
  
  @media(max-width:768px){
    #app{
      flex-direction:column;
      height:auto;
      min-height:100vh;
    }

    #sidebar{
      width:100%;
      min-width:100%;
      border-right:none;
      border-bottom:1px solid var(--border);
      max-height:none;
    }

    #topbar{
      flex-wrap:wrap;
      justify-content:flex-start;
      padding:1rem;
      gap:.6rem;
    }

    #content{
      padding:1rem;
    }

    .stat-grid,
    .stat-grid-4,
    .stat-grid-5,
    .chart-row-12,
    .chart-row-3,
    .chart-row-2,
    .filter-row,
    .gauges-row{
      grid-template-columns:1fr !important;
    }

    .emp-header{
      flex-direction:column;
      align-items:flex-start;
      gap:1rem;
    }

    .nav-tabs{
      overflow-x:auto;
      width:100%;
      padding-bottom:.4rem;
    }

    .nav-tab{
      flex-shrink:0;
    }

    table{
      min-width:720px;
    }
  }

</style>
</head>

  /* ── Normaliza o retorno do /recomendacoes → mesmo schema do dashboard ── 
    A API retorna: { empresa: {...}, recomendacao: {...} }
    O dashboard espera um objeto plano com todos os campos juntos.           */
  function normalizar(item) {
    const emp = item.empresa  || {};
    const rec = item.recomendacao || {};
    return {
      /* campos de EmpresaIndicadores */
      id_cnpj:                        emp.id_cnpj                        || '',
      uf:                             emp.uf                             || '',
      cd_cnae_prin:                   emp.cd_cnae_prin                   || '',
      descricao_cnae:                 emp.descricao_cnae                 || '',
      setor_resumo:                   emp.setor_resumo                   || emp.descricao_cnae || '',
      setor:                          emp.setor_resumo                   || emp.descricao_cnae || '',
      media_atraso_dias:              emp.media_atraso_dias              || 0,
      sacado_indice_liquidez_1m:      emp.sacado_indice_liquidez_1m      || 0,
      share_vl_inad_pag_bol_6_a_15d:  emp.share_vl_inad_pag_bol_6_a_15d || 0,
      /* campos de FIDCRecomendacao */
      score_final:                    rec.score_final                    || 0,
      sinal:                          rec.sinal                          || 'vermelho',
      label:                          rec.label                          || '',
      retorno_esperado:               rec.retorno_esperado               || '—',
      score_capacidade_pagamento:     rec.score_capacidade_pagamento     || 0,
      score_historico_pagamento:      rec.score_historico_pagamento      || 0,
      score_concentracao_risco:       rec.score_concentracao_risco       || 0,
      taxa_mercado_referencia:        rec.taxa_mercado_referencia        || 0,
    };
  }

  /* ── Carrega a carteira completa via GET /recomendacoes ── */
  async function carregarCarteira(limit = 5000) {
    const url = `${API_BASE}/recomendacoes?limit=${limit}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status} — ${await res.text()}`);
    const data = await res.json();          // array de RecomendacaoResponse
    return data.map(normalizar);
  }

  /* ── Carrega uma empresa específica via GET /recomendacao/{cnpj} ── */
  async function carregarEmpresa(cnpj) {
    /* O CNPJ pode ter pontuação (ex: 12.345.678/0001-99).
      Codifica para evitar problemas de roteamento na URL.  */
    const url = `${API_BASE}/recomendacao/${encodeURIComponent(cnpj)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const item = await res.json();          // RecomendacaoResponse
    return normalizar(item);
  }

  /* ── Carrega dados de simulação consolidada via GET /gold/simulacao ── */
  async function carregarSimulacao() {
    try {
      const res = await fetch(`${API_BASE}/gold/simulacao`);
      if (!res.ok) return {};
      return await res.json();
    } catch(e) { return {}; }
  }

  /* ── Carrega aging via GET /gold/aging ── */
  async function carregarAging() {
    try {
      const res = await fetch(`${API_BASE}/gold/aging`);
      if (!res.ok) return [];
      return await res.json();
    } catch(e) { return []; }
  }

    const ico = ICO_SINAL[sinal]||'';

  /* ══ VALIDAÇÃO DE DADOS ═════════════════════════════════════════════════════ */
  function valido(v) {
    if(v === null || v === undefined) return false;
    const s = String(v).trim();
    return s !== '' && s !== '—' && s !== '-' && s !== 'null'
        && s !== 'undefined' && s !== 'N/A' && s !== 'n/a';
  }

  function limparDados(arr) {
    return arr.filter(d =>
      valido(d.id_cnpj) &&
      valido(d.uf) &&
      valido(d.setor_resumo || d.descricao_cnae) &&
      valido(d.sinal) &&
      d.score_final > 0
    );
  }

  /* ══ INIT ═══════════════════════════════════════════════════════════════════ */
  async function initApp() {
    document.getElementById('sb-username').textContent = STATE.userName;
    document.getElementById('tb-username').textContent = STATE.userName;
    updateClock();
    setInterval(updateClock, 30000);

    showLoader("Conectando ao BigQuery…");

    try {
      /* ── Carrega ranking + dados gold em paralelo ── */
      const [carteira, simulacao, aging] = await Promise.all([
        carregarCarteira(5000),
        carregarSimulacao(),
        carregarAging(),
      ]);
      STATE.df         = limparDados(carteira);
      STATE.dfFiltered = [...STATE.df];
      STATE.simulacao  = simulacao;
      STATE.aging      = aging;
      document.getElementById('sb-total').textContent =
        `${STATE.df.length.toLocaleString('pt-BR')} empresas · Farol v2`;
      buildSidebarFilters();
      renderPage();
    } catch (err) {
      console.error('Erro ao carregar carteira:', err);
      showError(
        `Não foi possível conectar à API.<br>
        <small style="font-family:var(--mono)">${err.message}</small><br><br>
        Verifique se o FastAPI está rodando em <b>${API_BASE}</b> e se o CORS está habilitado.`
      );
    }
  }

  function updateClock() {
    const now = new Date();
    const fmt = now.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    document.getElementById('tb-time').textContent = fmt;
  }

  /* ══ SIDEBAR FILTERS — cascata: UF → Setor → Atraso → CNPJ ═══════════════ */

  const FAIXAS_ATRASO = {
    todos:    [null, null],
    sem:      [0,    0],
    baixo:    [1,    15],
    moderado: [16,   30],
    alto:     [31,   60],
    critico:  [61,   null],
  };

  function buildSidebarFilters() {
    /* Popula UF com todos os valores do dataset completo */
    const ufs = ['Todas', ...[...new Set(STATE.df.map(d=>d.uf).filter(v=>valido(v)))].sort()];
    _fillSelect('sb-uf', ufs);
    /* Popula Setor com todos os setores (cascata refinada depois em onUFChange) */
    const setores = ['Todos', ...[...new Set(STATE.df.map(d=>d.setor_resumo).filter(v=>valido(v)))].sort()];
    _fillSelect('sb-setor', setores);
    /* Dispara cascata completa */
    onAtrasoChange();
  }

  /* ── Chamado quando UF muda ─────────────────────────────────────────── */
  function onUFChange() {
    const uf = document.getElementById('sb-uf').value;

    /* Filtra dataset pela UF escolhida */
    const afterUF = uf === 'Todas' ? STATE.df : STATE.df.filter(d => d.uf === uf);

    /* Reconstrói select de Setor com apenas os setores existentes nessa UF
      Na página Mercado: usa STATE.df completo (ignora UF para listar setores) */
    const base = STATE.page === 'mercado' ? STATE.df : afterUF;
    const setores = ['Todos', ...[...new Set(base.map(d=>d.setor_resumo).filter(v=>valido(v)))].sort()];
    const prevSetor = document.getElementById('sb-setor').value;
    _fillSelect('sb-setor', setores);
    document.getElementById('sb-setor').value = setores.includes(prevSetor) ? prevSetor : 'Todos';

    onSetorChange();
  }

  /* ── Chamado quando Setor muda ──────────────────────────────────────── */
  function onSetorChange() {
    // Na página Mercado: filtro de setor NÃO restringe o dataset
    // (é usado apenas como referência para comparação)
    if(STATE.page === 'mercado') {
      renderPage(); // re-renderiza diretamente com o novo setor de referência
      return;
    }
    onAtrasoChange();
  }

  /* ── Chamado quando Atraso muda ─────────────────────────────────────── */
  function onAtrasoChange() {
    const uf     = document.getElementById('sb-uf').value;
    const setor  = document.getElementById('sb-setor').value;
    const atraso = document.getElementById('sb-atraso').value;
    const busca  = document.getElementById('sb-busca')?.value.trim().toLowerCase() || '';

    const [fMin, fMax] = FAIXAS_ATRASO[atraso] || [null, null];

    /* Aplica todos os filtros em cascata */
    let f = STATE.df;
    if(uf !== 'Todas')    f = f.filter(d => d.uf === uf);
    if(setor !== 'Todos') f = f.filter(d => d.setor_resumo === setor);
    if(fMin !== null || fMax !== null) {
      f = f.filter(d => {
        const dias = d.media_atraso_dias || 0;
        if(fMin !== null && dias < fMin) return false;
        if(fMax !== null && dias > fMax) return false;
        return true;
      });
    }
    STATE.dfFiltered = f;

    /* Reconstrói lista de CNPJs com busca */
    const cnpjs  = f.map(d => d.id_cnpj).filter(v => valido(v));
    const cnpjsF = busca ? cnpjs.filter(c => c.toLowerCase().includes(busca)) : cnpjs;

    const atrasoLabel = {
      todos:'', sem:' · Sem atraso', baixo:' · Baixo atraso',
      moderado:' · Atraso moderado', alto:' · Alto atraso', critico:' · Crítico'
    }[atraso] || '';

    document.getElementById('sb-count').textContent = `${cnpjsF.length} empresa(s)${atrasoLabel}`;

    const el = document.getElementById('sb-cnpj');
    el.innerHTML = `<option value="">Selecione...</option>` +
      cnpjsF.map(c => `<option value="${c}">${c}</option>`).join('');

    /* Mantém CNPJ selecionado se ainda válido, senão limpa */
    if(STATE.empresaSel && cnpjsF.includes(STATE.empresaSel)) {
      el.value = STATE.empresaSel;
    } else {
      STATE.empresaSel = '';
      el.value = '';
    }

    updateSidebarHint();
    renderPage();
  }

  /* ── applyFilters: alias para compatibilidade (busca CNPJ chama isso) ── */
  function applyFilters() { onAtrasoChange(); }

  /* ── Helper interno ─────────────────────────────────────────────────── */
  function _fillSelect(id, opts) {
    const el = document.getElementById(id);
    const prev = el.value;
    el.innerHTML = opts.map(o =>
      `<option value="${o}">${o.length>30 ? o.slice(0,29)+'…' : o}</option>`
    ).join('');
    if(opts.includes(prev)) el.value = prev;
  }

  function setSBCNPJ() {
    const v = document.getElementById('sb-cnpj').value;
    STATE.empresaSel = v || '';
    if(v) {
      if(STATE.page === 'overview') {
        goPage('empresa');
      } else {
        // Empresa, Setor e Setor vs Mercado — todos re-renderizam com novo CNPJ
        renderPage();
      }
    } else {
      renderPage();
    }
  }

  /* ══ NAVIGATION ═════════════════════════════════════════════════════════════ */
  const PAGE_LABELS = {overview:'Overview', empresa:'Análise de Empresa', setor:'Análise do Setor', mercado:'Setor vs Mercado'};

  function goPage(p) {
    // Limpa cross-filter da página que está saindo
    if(STATE.page === 'overview') STATE.xf    = {sinal:null, uf:null, setor:null};
    if(STATE.page === 'empresa')  STATE.xfEmp = {sinal:null};
    if(STATE.page === 'setor')    STATE.xfSet = {sinal:null, uf:null};
    if(STATE.page === 'mercado')   STATE.xfMkt = {sinal:null, uf:null};
    STATE.page = p;
    document.querySelectorAll('.nav-tab').forEach(t=>{
      t.classList.toggle('active', t.dataset.page===p);
    });
    document.getElementById('tb-title').textContent = PAGE_LABELS[p];
    updateSidebarHint();
    renderPage();

  /* ══ RENDER ══════════════════════════════════════════════════════════════════ */
  function renderPage() {
    const el = document.getElementById('content');
    el.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'page-anim';
    el.appendChild(wrap);
    if(STATE.page==='overview') renderOverview(wrap);
    else if(STATE.page==='empresa') renderEmpresa(wrap);
    else if(STATE.page==='setor') renderSetor(wrap);
    else if(STATE.page==='mercado') renderMercado(wrap);
  }

  /* ── GOLD CARDS — calculados dinamicamente a partir do df filtrado ──────── */
  function buildGoldCards() {
    var df = STATE.dfFiltered || [];

    // Aplica cross-filter do overview se ativo
    if(STATE.xf && STATE.xf.sinal)  df = df.filter(function(d){ return d.sinal === STATE.xf.sinal; });
    if(STATE.xf && STATE.xf.uf)     df = df.filter(function(d){ return d.uf === STATE.xf.uf; });
    if(STATE.xf && STATE.xf.setor)  df = df.filter(function(d){ return d.setor_resumo === STATE.xf.setor; });

    var n = df.length;
    if(!n) return '<div style="color:var(--muted2);font-size:.75rem;padding:.5rem 0;">Nenhuma empresa no filtro atual.</div>';

    // ── KPIs calculados do ranking ────────────────────────────────────────────
    var scoreMedio = n ? +(df.reduce(function(a,d){ return a + (d.score_final||0); }, 0) / n).toFixed(1) : 0;
    var verde    = df.filter(function(d){ return d.sinal==='verde'; }).length;
    var amarelo  = df.filter(function(d){ return d.sinal==='amarelo'; }).length;
    var vermelho = df.filter(function(d){ return d.sinal==='vermelho'; }).length;

    // ── Aging: recalcula a partir do df filtrado usando media_atraso_dias ─────
    // As faixas do FIDC são: Até 30d, 31-60d, 61-90d, 91-120d, 121-180d, >180d
    var faixasDef = [
      {label:'Até 30 dias',   min:0,   max:30,  haircut:5,  cor:'#34d399'},
      {label:'31 a 60 dias',  min:31,  max:60,  haircut:10, cor:'#a3e635'},
      {label:'61 a 90 dias',  min:61,  max:90,  haircut:20, cor:'#fbbf24'},
      {label:'91 a 120 dias', min:91,  max:120, haircut:35, cor:'#f59e0b'},
      {label:'121 a 180 dias',min:121, max:180, haircut:50, cor:'#f87171'},
      {label:'Acima de 180 dias', min:181, max:99999, haircut:70, cor:'#ef4444'},
    ];

    var faixaCounts = faixasDef.map(function(f) {
      var count = df.filter(function(d) {
        var dias = d.media_atraso_dias || 0;
        return dias >= f.min && dias <= f.max;
      }).length;
      return count;
    });

    var totalFaixas = faixaCounts.reduce(function(a,b){ return a+b; }, 0) || 1;

    // ── PDD estimada: score * haircut aproximado por faixa ───────────────────
    // Usa o score_capacidade_pagamento como proxy do valor de exposição
    // PDD simplificada: empresas com sinal vermelho têm haircut médio de 40%
    var pddEstimada = df.reduce(function(acc, d) {
      var haircut = d.sinal==='verde' ? 0.05 : d.sinal==='amarelo' ? 0.20 : 0.50;
      return acc + haircut * (d.score_final || 0) * 1000; // proxy
    }, 0);

    // Usa dados reais de simulação se disponíveis e sem filtro ativo
    var _uf     = (document.getElementById('sb-uf')     || {}).value || 'Todas';
    var _setor  = (document.getElementById('sb-setor')  || {}).value || 'Todos';
    var _atraso = (document.getElementById('sb-atraso') || {}).value || 'todos';
    var xf = STATE.xf || {};
    var temFiltro = _uf !== 'Todas' || _setor !== 'Todos' || _atraso !== 'todos'
      || xf.sinal || xf.uf || xf.setor;

    var sim = STATE.simulacao || {};
    var totalBolShow = temFiltro ? n.toLocaleString('pt-BR') + ' emp.' : (sim.total_boletos != null ? Number(sim.total_boletos).toLocaleString('pt-BR') + ' bol.' : n.toLocaleString('pt-BR') + ' emp.');
    var pddShow      = temFiltro ? '—' : (sim.pdd_total_rs != null ? 'R$ ' + Number(sim.pdd_total_rs).toLocaleString('pt-BR', {minimumFractionDigits:0,maximumFractionDigits:0}) : '—');
    var txInadShow   = temFiltro ? (df.filter(function(d){return (d.media_atraso_dias||0)>0;}).length / n * 100).toFixed(1) + '%' : (sim.taxa_inad_historica_pct != null ? Number(sim.taxa_inad_historica_pct).toFixed(2)+'%' : '—');
    var hhiSacShow   = temFiltro ? calcHHI(df, 'id_cnpj') : (sim.hhi_sacados != null ? Number(sim.hhi_sacados).toFixed(4) : '—');
    var hhiCedShow   = temFiltro ? calcHHI(df, 'setor_resumo') : (sim.hhi_cedentes != null ? Number(sim.hhi_cedentes).toFixed(4) : '—');

    var subBoletos = temFiltro ? 'empresas no filtro' : (sim.valor_total_rs != null ? 'R$ ' + Number(sim.valor_total_rs).toLocaleString('pt-BR', {minimumFractionDigits:0,maximumFractionDigits:0}) + ' emitido' : '');
    var subPDD     = temFiltro ? 'filtro ativo — sem dado' : 'provisão para devedores';
    var subTxInad  = temFiltro ? '% com atraso > 0d' : 'histórica da carteira';
    var subHhiSac  = temFiltro ? 'concentração por empresa' : 'concentração pagadores';
    var subHhiCed  = temFiltro ? 'concentração por setor' : 'concentração cedentes';

    // ── Aging cards ───────────────────────────────────────────────────────────
    var agingHTML = faixasDef.map(function(f, i) {
      var count = faixaCounts[i];
      var pct   = +(count / totalFaixas * 100).toFixed(1);
      var w     = Math.min(pct, 100);
      return '<div class="pbar">'
        + '<div class="pbar-row">'
        + '<span class="pbar-lbl">' + f.label + ' <span style="color:var(--muted3);font-size:.55rem;">(haircut ' + f.haircut + '%)</span></span>'
        + '<span class="pbar-val" style="color:' + f.cor + '">' + pct + '% · ' + count + ' empresa' + (count!==1?'s':'') + '</span>'
        + '</div>'
        + '<div class="pbar-bg"><div class="pbar-fill" style="width:' + w + '%;background:' + f.cor + '"></div></div>'
        + '</div>';
    }).join('');

    return '<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:.8rem;margin-bottom:.8rem;">'
      + '<div class="stat-card blue"><div class="sc-label">TOTAL BOLETOS</div><div class="sc-val" style="font-size:1.2rem">' + totalBolShow + '</div><div class="sc-sub">' + subBoletos + '</div></div>'
      + '<div class="stat-card red"><div class="sc-label">PDD ESTIMADA</div><div class="sc-val" style="font-size:1.1rem">' + pddShow + '</div><div class="sc-sub">' + subPDD + '</div></div>'
      + '<div class="stat-card amber"><div class="sc-label">TAXA INAD.</div><div class="sc-val" style="font-size:1.4rem">' + txInadShow + '</div><div class="sc-sub">' + subTxInad + '</div></div>'
      + '<div class="stat-card purple"><div class="sc-label">HHI SACADOS</div><div class="sc-val" style="font-size:1.3rem">' + hhiSacShow + '</div><div class="sc-sub">' + subHhiSac + '</div></div>'
      + '<div class="stat-card cyan"><div class="sc-label">HHI CEDENTES</div><div class="sc-val" style="font-size:1.3rem">' + hhiCedShow + '</div><div class="sc-sub">' + subHhiCed + '</div></div>'
      + '</div>'
      + '<div class="chart-card" style="margin-bottom:.8rem;">'
      +   '<div class="chart-title">DISTRIBUIÇÃO DE ATRASO MÉDIO — EMPRESAS FILTRADAS'
      +   (temFiltro ? ' <span style="color:var(--purple2);font-size:.5rem;font-weight:400;text-transform:none;">· filtro ativo</span>' : '')
      +   '</div>'
      +   agingHTML
      + '</div>';
  }

  /* ── Calcula HHI (Herfindahl-Hirschman Index) de um campo ── */
  function calcHHI(df, campo) {
    if(!df.length) return '—';
    var counts = {};
    df.forEach(function(d) {
      var k = d[campo] || 'N/A';
      counts[k] = (counts[k]||0) + 1;
    });
    var n = df.length;
    var hhi = Object.values(counts).reduce(function(acc, c) {
      return acc + Math.pow(c/n, 2);
    }, 0);
    return hhi.toFixed(4);
  }

    /* ── OVERVIEW ──────────────────────────────────────────────────────────── */
  function renderOverview(wrap) {
    /* ── 1. Dataset: aplica filtros sidebar + cross-filter ── */
    let df = STATE.dfFiltered;
    if(STATE.xf.sinal)  df = df.filter(d => d.sinal === STATE.xf.sinal);
    if(STATE.xf.uf)     df = df.filter(d => d.uf === STATE.xf.uf);
    if(STATE.xf.setor)  df = df.filter(d => d.setor_resumo === STATE.xf.setor);

    /* ── 2. KPIs ── */
    const total    = df.length;
    const scores   = df.map(d => d.score_final);
    const med      = total ? +(scores.reduce((a,b)=>a+b,0)/total).toFixed(1) : 0;
    const verde    = df.filter(d=>d.sinal==='verde').length;
    const amarelo  = df.filter(d=>d.sinal==='amarelo').length;
    const vermelho = df.filter(d=>d.sinal==='vermelho').length;
    const pV = total ? Math.round(verde/total*100)   : 0;
    const pA = total ? Math.round(amarelo/total*100)  : 0;
    const pR = total ? Math.round(vermelho/total*100) : 0;

    /* ── 3. Agrupa UF e Setor SOMENTE com o df já filtrado ── */
    const byUF = {};
    df.forEach(d => {
      if(!valido(d.uf)) return;
      if(!byUF[d.uf]) byUF[d.uf] = {s:0, c:0};
      byUF[d.uf].s += d.score_final; byUF[d.uf].c++;
    });
    const ufData = Object.entries(byUF)
      .map(([k,v]) => ({uf:k, sc:+(v.s/v.c).toFixed(1)}))
      .sort((a,b) => b.sc - a.sc);

    const bySt = {};
    df.forEach(d => {
      const k = d.setor_resumo||'';
      if(!valido(k)) return;
      if(!bySt[k]) bySt[k] = {s:0, c:0};
      bySt[k].s += d.score_final; bySt[k].c++;
    });
    const stData = Object.entries(bySt)
      .map(([k,v]) => ({st:k, sc:+(v.s/v.c).toFixed(1)}))
      .sort((a,b) => a.sc - b.sc)
      .slice(-8);

    /* ── 5. HTML ── */
    wrap.innerHTML = `

        ${statCard('MODERADO', pA+'%', amarelo+' empresas','amber','── '+amarelo+' em observação','down')}
        ${statCard('ALTO RISCO', pR+'%', vermelho+' empresas','red','↓ '+vermelho+' em alerta','down')}
      </div>

          <div id="plt-donut"></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">DISTRIBUIÇÃO DE SCORE</div>
          <div id="plt-hist"></div>
        </div>
      </div>
      <div class="grad-div"></div>
      <div class="chart-row chart-row-2" style="margin-bottom:.8rem;">
        <div class="chart-card">
          <div class="chart-title">SCORE MÉDIO POR UF <span style="font-size:.52rem;color:var(--muted3);font-weight:400;text-transform:none;">(${ufData.length} estado${ufData.length!==1?'s':''}) · clique</span></div>

  function buildTable(df, clickable=false) {
    const cols  = ['id_cnpj','uf','setor_resumo','sinal','score_final','retorno_esperado','media_atraso_dias'];
    const heads = ['CNPJ','UF','Setor','Sinal','Score','Retorno Esp.','Atraso (d)'];
    // Remove linhas com campos críticos inválidos
    const rows  = [...df]
      .filter(r => valido(r.id_cnpj) && valido(r.uf) && valido(r.setor_resumo) && r.score_final > 0)
      .sort((a,b)=>b.score_final-a.score_final)
      .slice(0,500);
    const rowStyle = clickable
      ? 'cursor:pointer;transition:background .15s;'
      : '';
    const onclickFn = clickable
      ? (cnpj) => `onclick="tblClickEmpresa('${cnpj}')"`
      : () => '';
    return `<table>
      <thead><tr>${heads.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(r=>`<tr style="${rowStyle}" ${onclickFn(r.id_cnpj)}
        onmouseover="${clickable?`this.style.background='var(--bg3)'`:''}"
        onmouseout="${clickable?`this.style.background=''`:''}">
        <td style="font-family:var(--mono);font-size:.62rem">${r.id_cnpj}</td>
        <td>${r.uf}</td>
        <td style="max-width:140px;white-space:nowrap;overflow-x:hidden; overflow-y:auto;text-overflow:ellipsis">${r.setor_resumo||'—'}</td>
        <td>${badge(r.sinal)}</td>
        <td style="font-weight:700;color:${COR_SINAL[r.sinal]||'var(--text)'}">${r.score_final.toFixed(1)}</td>
        <td>${typeof r.retorno_esperado==='number'?(r.retorno_esperado*100).toFixed(2)+'%':(r.retorno_esperado||'—')}</td>
        <td>${(r.media_atraso_dias||0).toFixed(1)}</td>
      </tr>`).join('')}</tbody>

  /* ── SETOR: usa setor da sidebar como parâmetro ──────────────────────── */
  function renderSetor(wrap) {
    wrap.innerHTML = `<div id="set-body"></div>`;
    const setorSel = document.getElementById('sb-setor')?.value || 'Todos';
    if(!setorSel || setorSel === 'Todos') {
      document.getElementById('set-body').innerHTML = emptyState(

    const empDados = STATE.empresaSel
      ? (STATE.dfFiltered.find(d=>d.id_cnpj===STATE.empresaSel)
      || STATE.df.find(d=>d.id_cnpj===STATE.empresaSel))
      : null;

  function renderSetorBody(setor_sel, empDados=null){
    /* ── 1. Base do setor (sidebar filters já aplicados) ── */
    const df_s = STATE.dfFiltered.filter(d => d.setor_resumo === setor_sel && valido(d.id_cnpj) && valido(d.uf));
    if(!df_s.length) {
      document.getElementById('set-body').innerHTML = emptyState('📊','Sem empresas neste setor','Tente remover filtros de UF ou Faixa de Atraso');
      return;
    }

    /* ── 2. Cross-filter do Setor aplicado sobre df_s ── */
    let df = df_s;
    if(STATE.xfSet.sinal) df = df.filter(d => d.sinal === STATE.xfSet.sinal);
    if(STATE.xfSet.uf)    df = df.filter(d => d.uf    === STATE.xfSet.uf);

    /* ── 3. Métricas sempre sobre df (já filtrado) ── */
    const n      = df.length;
    const n_tot  = df_s.length; // total base (sem cross-filter) para contexto
    const scores = df.map(d=>d.score_final);
    const med_s  = n ? +(scores.reduce((a,b)=>a+b,0)/n).toFixed(1) : 0;
    const max_s  = n ? +Math.max(...scores).toFixed(1) : 0;
    const min_s  = n ? +Math.min(...scores).toFixed(1) : 0;
    const n_v    = df.filter(d=>d.sinal==='verde').length;
    const n_a    = df.filter(d=>d.sinal==='amarelo').length;
    const n_r    = df.filter(d=>d.sinal==='vermelho').length;
    const med_cap  = n ? +(df.reduce((a,d)=>a+(d.score_capacidade_pagamento||0),0)/n).toFixed(1) : 0;
    const med_hist = n ? +(df.reduce((a,d)=>a+(d.score_historico_pagamento||0),0)/n).toFixed(1) : 0;
    const med_conc = n ? +(df.reduce((a,d)=>a+(d.score_concentracao_risco||0),0)/n).toFixed(1) : 0;

    /* Atraso por UF — sobre df filtrado */
    const byUFAtr = {};
    df.forEach(d => {
      if(!byUFAtr[d.uf]) byUFAtr[d.uf] = {s:0,c:0};
      byUFAtr[d.uf].s += (d.media_atraso_dias||0); byUFAtr[d.uf].c++;
    });
    const ufAtrData = Object.entries(byUFAtr)
      .map(([uf,v]) => ({uf, med:+(v.s/v.c).toFixed(1)}))
      .sort((a,b) => b.med - a.med);

    const topUF = ufAtrData[0]?.uf || '—';

    /* ── Dados da empresa selecionada (para gráfico combinado) ── */
    const emp = empDados || (STATE.empresaSel
      ? (STATE.dfFiltered.find(d=>d.id_cnpj===STATE.empresaSel)
      || STATE.df.find(d=>d.id_cnpj===STATE.empresaSel))
      : null);
    const emp_score = emp ? (emp.score_final||0) : null;
    const emp_cap   = emp ? (emp.score_capacidade_pagamento||0) : null;
    const emp_hist  = emp ? (emp.score_historico_pagamento||0) : null;
    const emp_conc  = emp ? (emp.score_concentracao_risco||0) : null;
    const emp_cnpj  = emp ? emp.id_cnpj : null;
    const temEmp    = emp !== null;
    const df_rank_xf = [...df].sort((a,b)=>b.score_final-a.score_final);

    /* ── 4. Badge cross-filter ── */
    const xfAtivo = STATE.xfSet.sinal || STATE.xfSet.uf;
    const xfBadge = xfAtivo ? `
      <div style="display:flex;align-items:center;gap:.5rem;background:#1e1b3a;
          border:1px solid var(--purple);border-radius:8px;padding:.4rem .9rem;
          margin-bottom:.8rem;flex-wrap:wrap;">
        <span style="font-size:.6rem;font-weight:700;color:var(--purple2);letter-spacing:.08em;text-transform:uppercase;">
          Seleção: ${n} de ${n_tot} empresa${n_tot!==1?'s':''}
        </span>
        ${STATE.xfSet.sinal?`<span class="xf-chip" onclick="clearXFSet('sinal')">${{verde:'✅ Baixo Risco',amarelo:'⚡ Moderado',vermelho:'🚨 Alto Risco'}[STATE.xfSet.sinal]} ×</span>`:''}
        ${STATE.xfSet.uf?`<span class="xf-chip" onclick="clearXFSet('uf')">📍 ${STATE.xfSet.uf} ×</span>`:''}
        <button onclick="clearAllXFSet()" style="margin-left:auto;background:transparent;
          border:1px solid var(--border2);color:var(--muted);border-radius:6px;
          font-size:.62rem;padding:.2rem .6rem;cursor:pointer;font-family:var(--font);">
          Limpar
        </button>
      </div>` : '';

    /* ── 5. HTML ── */
    document.getElementById('set-body').innerHTML = `
      ${xfBadge}
      <div class="emp-header" style="border-left-color:var(--purple);margin-bottom:.9rem;">
        <div class="eh-left">
          <div style="font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--purple2);margin-bottom:.25rem;">ANÁLISE DO SETOR</div>
          <div style="font-size:.95rem;font-weight:800;color:var(--text);">${setor_sel}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:.62rem;color:var(--muted2);">${n} empresa${n!==1?'s':''} · UF principal: ${topUF}</div>
          <div style="font-size:.9rem;font-weight:700;color:var(--text);margin-top:2px;">Score Médio <span style="color:var(--purple2)">${med_s}</span></div>
        </div>
      </div>

      <div class="stat-grid-5" style="margin-bottom:1rem;">
        ${statCard('EMPRESAS', n.toString(), 'no setor filtrado', 'purple')}
        ${statCard('SCORE MÉDIO', med_s.toFixed(1), 'de 100 pontos', 'blue')}
        ${statCard('BAIXO RISCO', n_v.toString(), n?Math.round(n_v/n*100)+'% do setor':'—', 'green', '↑ '+n_v+' aptas','up')}
        ${statCard('MODERADO', n_a.toString(), n?Math.round(n_a/n*100)+'% do setor':'—', 'amber')}
        ${statCard('ALTO RISCO', n_r.toString(), n?Math.round(n_r/n*100)+'% do setor':'—', 'red','↓ '+n_r+' em alerta','down')}
      </div>

      <div class="grad-div"></div>

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.8rem;margin-bottom:.8rem;">
        <div class="chart-card">
          <div class="chart-title">EMPRESA VS SETOR — INDICADORES
            <span style="font-size:.52rem;color:var(--muted3);font-weight:400;text-transform:none;">
              ${temEmp ? '· linha = empresa selecionada' : '· selecione um CNPJ para comparar'}
            </span>
          </div>
          <div id="plt-bar-mmm"></div>
        </div>
        <div class="chart-card">

    /* ── 6. Gráficos — todos alimentados pelo mesmo df ── */

    const emp_dim = temEmp ? [emp_cap, emp_hist, emp_conc, emp_score] : null;

    const tracesMmm = [

        text:med_dim.map(v=>v.toFixed(0)), textposition:'inside',
        textfont:{color:getPlotlyColors().text,size:9,family:'DM Sans'},
        hovertemplate:'Média: <b>%{y:.1f}</b><extra></extra>',
      },
      /* Barra: Máximo do setor */
      {
        name:'Máx. Setor', type:'bar', x:dims, y:max_dim,
        marker:{color:'rgba(16,185,129,.25)',line:{color:'rgba(16,185,129,.5)',width:1}},
        text:max_dim.map(v=>v.toFixed(0)), textposition:'inside',

    /* Linha: empresa selecionada (se existir) */

    Plotly.newPlot('plt-bar-mmm', tracesMmm, {

      legend:{
        orientation:'h', x:.5, xanchor:'center', y:-.18,
        font:{color:getPlotlyColors().font, size:8, family:'DM Sans'},
        bgcolor:'rgba(0,0,0,0)',
      },
      margin:{t:16,b:48,l:36,r:16},
      xaxis:{
        showgrid:false, color:getPlotlyColors().axis,
        tickfont:{size:9, color:getPlotlyColors().tickfont},
      },
      yaxis:{
        showgrid:true, gridcolor:getPlotlyColors().grid, color:getPlotlyColors().axis,

    /* Donut — com clique */
    Plotly.newPlot('plt-donut-set',[{
      type:'pie',

      textinfo:'percent',textfont:{color:'#fff',size:10},
      hovertemplate:'<b>%{label}</b><br>%{value} empresas (%{percent})<extra></extra>',
    }],{...base,height:H,margin:{t:16,b:16,l:16,r:100},
      showlegend:true,
      legend:{orientation:'v',x:1.02,y:.5,xanchor:'left',font:{color:getPlotlyColors().tickfont,size:9},bgcolor:'rgba(0,0,0,0)'},
    },cfg);
    document.getElementById('plt-donut-set').on('plotly_click', ev=>{
      const map={'Baixo Risco':'verde','Moderado':'amarelo','Alto Risco':'vermelho'};
      const s=map[ev.points[0].label];
      STATE.xfSet.sinal = STATE.xfSet.sinal===s ? null : s;
      renderPage();
    });

    /* Histograma */
    Plotly.newPlot('plt-hist-set',[{
      type:'histogram',x:scores,
      xbins:{start:0,end:100,size:5},
      marker:{color:'#7c3aed',opacity:.85,line:{width:0}},
    }],{...base,height:H,bargap:.06,showlegend:false,
      margin:{t:16,b:36,l:36,r:16},
      xaxis:{showgrid:false,range:[0,100],color:getPlotlyColors().axis,tickfont:{size:9},
            title:{text:'Score',font:{color:getPlotlyColors().axis,size:9}}},

      shapes:[{type:'line',x0:med_s,x1:med_s,y0:0,y1:1,yref:'paper',
              line:{color:'#a78bfa',width:2,dash:'dash'}}],
      annotations:[{x:med_s,y:.96,yref:'paper',text:'Média '+med_s,
                    font:{color:'#a78bfa',size:9,family:'DM Sans'},showarrow:false,xanchor:'left'}],
    },cfg);

    /* Radar */
    Plotly.newPlot('plt-radar-set',[{
      type:'scatterpolar',
      r:[med_cap,med_hist,med_conc,med_s],
      theta:['Capacidade','Histórico','Concentração','Score Médio'],
      fill:'toself',fillcolor:'rgba(124,58,237,.15)',
      line:{color:'#7c3aed',width:2},marker:{color:'#a78bfa',size:5},
    }],{...base,height:H,margin:{t:16,b:16,l:24,r:24},
      polar:{bgcolor:'#0a0914',
        radialaxis:{visible:true,range:[0,100],color:getPlotlyColors().muted,gridcolor:getPlotlyColors().grid,tickfont:{size:7,color:getPlotlyColors().muted}},
        angularaxis:{color:getPlotlyColors().axis,gridcolor:getPlotlyColors().grid,tickfont:{size:9,color:getPlotlyColors().tickfont}}},
      showlegend:false,
    },cfg);

    /* Distribuição de faixas de atraso do setor — 5 barras */
    const FAIXAS_SET = [
      {key:'sem',      label:'Sem Atraso', sublabel:'0 dias',     cor:'#10b981'},
      {key:'baixo',    label:'Baixo',      sublabel:'1–15 dias',  cor:'#6ee7b7'},
      {key:'moderado', label:'Moderado',   sublabel:'16–30 dias', cor:'#f5c518'},
      {key:'alto',     label:'Alto',       sublabel:'31–60 dias', cor:'#f59e0b'},
      {key:'critico',  label:'Crítico',    sublabel:'>60 dias',   cor:'#ef4444'},
    ];

    // Conta empresas por faixa usando df (já filtrado pelo cross-filter)
    const faixasSet = {sem:0, baixo:0, moderado:0, alto:0, critico:0};
    df.forEach(d => {
      const dias = d.media_atraso_dias||0;

      faixasSet[f]++;
    });
    const totalSet = n || 1;

    Plotly.newPlot('plt-atraso-set',[{

      text: FAIXAS_SET.map(f => {
        const n_ = faixasSet[f.key];
        const pct = Math.round(n_/totalSet*100);
        return n_ > 0 ? `${n_} (${pct}%)` : '0';
      }),
      textposition:'auto',
      textfont:{color:'#eceaf8', size:11, family:'DM Sans'},
      cliponaxis:false,
      hovertemplate:'<b>%{x}</b><br>%{y} empresa(s)<extra></extra>',

      ...base, height:H, bargap:.25, showlegend:false,
      margin:{t:28,b:8,l:36,r:16},

      yaxis:{showgrid:true,gridcolor:getPlotlyColors().grid,color:getPlotlyColors().axis,tickfont:{size:9},

    /* Ranking — só empresas do df filtrado, clique → Empresa */

  /* ══ SETOR VS MERCADO ═══════════════════════════════════════════════════════ */
  function renderMercado(wrap) {
    wrap.innerHTML = `<div id="mkt-body"></div>`;

    /* Precisa de empresa selecionada para saber o setor de referência */
    /* Setor de referência vem do filtro de Setor da sidebar */
    const setorRef = document.getElementById('sb-setor')?.value || 'Todos';
    if(!setorRef || setorRef === 'Todos') {
      document.getElementById('mkt-body').innerHTML = emptyState(
        '🌐','Nenhum setor selecionado',
        'Use o filtro "Setor" na sidebar para selecionar o setor que deseja comparar com o mercado'
      );
      return;
    }

    /* ── Agrega métricas por setor ── */
    const bySetor = {};
    // Mercado: usa df filtrado por UF e Atraso, mas NUNCA por setor
    // (comparação é entre todos os setores — filtrar por setor destruiria a análise)
    const uf_mkt     = document.getElementById('sb-uf')?.value || 'Todas';
    const atraso_mkt = document.getElementById('sb-atraso')?.value || 'todos';
    const FAIXAS_MKT = {todos:[null,null],sem:[0,0],baixo:[1,15],moderado:[16,30],alto:[31,60],critico:[61,null]};
    const [fMinMkt, fMaxMkt] = FAIXAS_MKT[atraso_mkt] || [null,null];

    let df_mkt_base = STATE.df;
    if(uf_mkt !== 'Todas') df_mkt_base = df_mkt_base.filter(d => d.uf === uf_mkt);
    if(fMinMkt !== null || fMaxMkt !== null) {
      df_mkt_base = df_mkt_base.filter(d => {
        const dias = d.media_atraso_dias || 0;
        if(fMinMkt !== null && dias < fMinMkt) return false;
        if(fMaxMkt !== null && dias > fMaxMkt) return false;
        return true;
      });
    }

    df_mkt_base.forEach(d => {
      const s = d.setor_resumo || d.descricao_cnae || '';
      if(!valido(s)) return;
      if(!bySetor[s]) bySetor[s] = {scores:[], caps:[], hists:[], concs:[], atrasos:[], sinais:[]};
      bySetor[s].scores.push(d.score_final||0);
      bySetor[s].caps.push(d.score_capacidade_pagamento||0);
      bySetor[s].hists.push(d.score_historico_pagamento||0);
      bySetor[s].concs.push(d.score_concentracao_risco||0);
      bySetor[s].atrasos.push(d.media_atraso_dias||0);
      bySetor[s].sinais.push(d.sinal||'vermelho');
      // Faixa de atraso por empresa
      const dias = d.media_atraso_dias||0;
      const faixa = dias===0?'sem':dias<=15?'baixo':dias<=30?'moderado':dias<=60?'alto':'critico';
      bySetor[s].faixas = bySetor[s].faixas||{sem:0,baixo:0,moderado:0,alto:0,critico:0};
      bySetor[s].faixas[faixa]++;
    });

    const avg = arr => arr.length ? +(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1) : 0;

    const setores = Object.entries(bySetor).map(([nome, v]) => ({
      nome,
      n:         v.scores.length,
      score:     avg(v.scores),
      cap:       avg(v.caps),
      hist:      avg(v.hists),
      conc:      avg(v.concs),
      atraso:    avg(v.atrasos),
      pct_verde: +(v.sinais.filter(s=>s==='verde').length / v.sinais.length * 100).toFixed(1),
      faixas:    v.faixas || {sem:0,baixo:0,moderado:0,alto:0,critico:0},
      isRef:     nome === setorRef
              || nome.toLowerCase().includes(setorRef.toLowerCase())
              || setorRef.toLowerCase().includes(nome.toLowerCase()),
    })).sort((a,b)=>b.score-a.score);

    // Sem dados — provavelmente filtros muito restritivos
    if(!setores.length) {
      document.getElementById('mkt-body').innerHTML = emptyState(
        '📊','Sem dados para este filtro',
        'Tente remover o filtro de UF ou Faixa de Atraso'
      );
      return;
    }

    const refData    = setores.find(s=>s.isRef) || setores[0];
    const allScores  = setores.map(s=>s.score);
    const medGeral   = avg(allScores);
    const posicao    = setores.findIndex(s=>s.isRef)+1;
    const pctGeral   = setores.length ? +(posicao/setores.length*100).toFixed(0) : 0;
    const pctPosicao = setores.length ? Math.round((1-(posicao-1)/setores.length)*100) : 0;

    /* ── Cross-filter ── */
    let df_mkt = [...setores];
    if(STATE.xfMkt.sinal) {
      const map = {verde:s=>s.pct_verde>=50, amarelo:s=>s.pct_verde>=20&&s.pct_verde<50, vermelho:s=>s.pct_verde<20};
      if(map[STATE.xfMkt.sinal]) df_mkt = df_mkt.filter(map[STATE.xfMkt.sinal]);
    }

    const xfAtivo = STATE.xfMkt.sinal || STATE.xfMkt.uf;
    const xfBadge = xfAtivo ? `
      <div style="display:flex;align-items:center;gap:.5rem;background:#1e1b3a;
          border:1px solid var(--purple);border-radius:8px;padding:.4rem .9rem;
          margin-bottom:.8rem;flex-wrap:wrap;">
        <span style="font-size:.6rem;font-weight:700;color:var(--purple2);letter-spacing:.1em;text-transform:uppercase;">Seleção:</span>
        ${STATE.xfMkt.sinal?`<span class="xf-chip" onclick="clearXFMkt('sinal')">${{verde:'✅ Predominância Verde',amarelo:'⚡ Predominância Amarelo',vermelho:'🚨 Predominância Vermelho'}[STATE.xfMkt.sinal]||STATE.xfMkt.sinal} ×</span>`:''}
        <button onclick="clearAllXFMkt()" style="margin-left:auto;background:transparent;border:1px solid var(--border2);color:var(--muted);border-radius:6px;font-size:.62rem;padding:.2rem .6rem;cursor:pointer;font-family:var(--font);">Limpar</button>
      </div>` : '';

    /* ── HTML ── */
    document.getElementById('mkt-body').innerHTML = `
      ${xfBadge}

      <!-- HEADER -->
      <div class="emp-header" style="border-left-color:var(--purple);margin-bottom:.9rem;">
        <div class="eh-left">
          <div style="font-size:.58rem;font-weight:900;text-transform:uppercase;letter-spacing:.14em;color:var(--purple2);margin-bottom:.25rem;">SETOR VS MERCADO</div>
          <div style="font-size:.95rem;font-weight:700;color:var(--text);">${setorRef}</div>
          <div style="font-size:.65rem;color:var(--muted2);margin-top:.2rem;">Comparando com todos os setores do mercado</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:.62rem;color:var(--muted2);">${setores.length} setores · ${STATE.df.length} empresas</div>
          <div style="font-size:.9rem;font-weight:700;color:var(--text);margin-top:2px;">
            Média geral <span style="color:var(--purple2)">${medGeral.toFixed(1)}</span>
          </div>
        </div>
      </div>

      <!-- KPIs -->
      <div class="stat-grid-5" style="margin-bottom:1rem;">
        ${statCard('SCORE DO SETOR', refData.score.toFixed(1), 'vs média geral '+medGeral.toFixed(1), refData.score>=medGeral?'green':'red',
          refData.score>=medGeral ? '↑ Acima da média' : '↓ Abaixo da média',
          refData.score>=medGeral ? 'up' : 'down')}
        ${statCard('POSIÇÃO', posicao+'º', 'de '+setores.length+' setores', posicao<=3?'green':posicao<=setores.length*.5?'amber':'red')}
        ${statCard('PERCENTIL', pctPosicao+'%', 'entre os setores', pctPosicao>=65?'green':pctPosicao>=40?'amber':'red')}
        ${statCard('EMPRESAS', refData.n.toString(), 'no setor', 'blue')}
        ${statCard('% BAIXO RISCO', refData.pct_verde.toFixed(0)+'%', 'empresas saudáveis', refData.pct_verde>=50?'green':refData.pct_verde>=25?'amber':'red')}
      </div>

      <div class="grad-div"></div>

      <!-- ROW 1: Ranking + Radar + Scatter -->
      <div style="display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:.8rem;margin-bottom:.8rem;">
        <div class="chart-card">
          <div class="chart-title">EMPRESAS POR ESTADO — ${setorRef.length>25?setorRef.slice(0,24)+"…":setorRef}</div>
          <div id="plt-mkt-rank"></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">RADAR: SETOR VS MERCADO</div>
          <div id="plt-mkt-radar"></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">SCORE VS % BAIXO RISCO</div>
          <div id="plt-mkt-scatter"></div>
        </div>
      </div>

      <div class="grad-div"></div>

      <!-- ROW 2: Atraso médio + Tabela completa -->
      <div style="display:grid;grid-template-columns:1fr 1.6fr;gap:.8rem;align-items:start;">
        <div class="chart-card">
          <div class="chart-title">DISTRIBUIÇÃO DE ATRASO — FAIXAS DO SETOR</div>
          <div id="plt-mkt-atraso"></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">TODOS OS SETORES</div>
          <div class="tbl-wrap" id="tbl-mkt" style="max-height:200px;">${buildMktTable(setores, setorRef)}</div>
        </div>
      </div>`;

    /* ── Gráficos ── */
    const cfg  = {responsive:true, displayModeBar:false};
    var _c = getPlotlyColors();
    const base = {paper_bgcolor:_c.bg, plot_bgcolor:_c.bg,
                  font:{color:_c.font, family:'DM Sans', size:10}};

    /* Empresas por UF — do setor selecionado */
    const byUFRef = {};
    df_mkt_base
      .filter(d => (d.setor_resumo||d.descricao_cnae||'—') === refData.nome
                || (d.setor_resumo||d.descricao_cnae||'—').toLowerCase().includes(setorRef.toLowerCase())
                || setorRef.toLowerCase().includes((d.setor_resumo||d.descricao_cnae||'—').toLowerCase()))
      .forEach(d => { byUFRef[d.uf] = (byUFRef[d.uf]||0) + 1; });

    const ufRefData = Object.entries(byUFRef)
      .map(([uf, n]) => ({uf, n}))
      .sort((a,b) => b.n - a.n);

    const ufRefCores = ufRefData.map(d =>
      d.n >= 50 ? '#9d77f5' : d.n >= 20 ? '#6d28d9' : '#4c1d95'
    );

    Plotly.newPlot('plt-mkt-rank',[{
      type:'bar',
      x: ufRefData.map(d => d.uf),
      y: ufRefData.map(d => d.n),
      marker:{color:ufRefCores, line:{width:0}},
      text: ufRefData.map(d => d.n),
      textposition:'outside',
      textfont:{color:'#eceaf8', size:10, family:'DM Sans'},
      cliponaxis:false,
      hovertemplate:'<b>%{x}</b><br>%{y} empresa(s)<extra></extra>',
    }],{
      ...base,
      height: 220,
      bargap: .25,
      showlegend: false,
      margin:{t:24,b:40,l:36,r:16},
      xaxis:{
        showgrid:false, color:getPlotlyColors().axis,
        tickfont:{size:9,color:getPlotlyColors().tickfont},
        tickangle: ufRefData.length > 10 ? -45 : 0,
        automargin:true,
      },
      yaxis:{
        showgrid:true, gridcolor:getPlotlyColors().grid, color:getPlotlyColors().axis,
        tickfont:{size:8}, zeroline:false,
        title:{text:'empresas', font:{color:getPlotlyColors().axis,size:9}},
      },
    },cfg);

    /* Radar: setor ref vs média do mercado */
    Plotly.newPlot('plt-mkt-radar',[
      {type:'scatterpolar',
        r:[refData.cap, refData.hist, refData.conc, refData.score],
        theta:['Capacidade','Histórico','Concentração','Score'],
        fill:'toself', name:setorRef.length>18?setorRef.slice(0,17)+'…':setorRef,
        fillcolor:'rgba(109,40,217,.2)',
        line:{color:'#9d77f5',width:2.5},marker:{color:'#9d77f5',size:6}},
      {type:'scatterpolar',
        r:[avg(setores.map(s=>s.cap)), avg(setores.map(s=>s.hist)),
          avg(setores.map(s=>s.conc)), medGeral],
        theta:['Capacidade','Histórico','Concentração','Score'],
        fill:'toself', name:'Média Mercado',
        fillcolor:'rgba(88,86,126,.12)',
        line:{color:getPlotlyColors().axis,width:1.5,dash:'dash'},marker:{color:getPlotlyColors().axis,size:4}},
    ],{
      ...base, height:280,
      margin:{t:16,b:40,l:24,r:24},
      polar:{bgcolor:getPlotlyColors().polar_bg,
        radialaxis:{visible:true,range:[0,100],color:'#3a3860',gridcolor:getPlotlyColors().grid,tickfont:{size:7,color:'#3a3860'}},
        angularaxis:{color:getPlotlyColors().axis,gridcolor:getPlotlyColors().grid,tickfont:{size:9,color:getPlotlyColors().tickfont}}},
      showlegend:true,
      legend:{font:{color:getPlotlyColors().tickfont,size:8,family:'DM Sans'},bgcolor:'rgba(0,0,0,0)',
              orientation:'h',x:.5,xanchor:'center',y:-.15},
    },cfg);

    /* Scatter: score vs % baixo risco */
    const scatterColors = setores.map(s => s.isRef?'#9d77f5':s.score>=65?'#10b981':s.score>=40?'#f59e0b':'#ef4444');
    const scatterSizes  = setores.map(s => s.isRef ? 14 : 7);
    Plotly.newPlot('plt-mkt-scatter',[{
      type:'scatter',
      x: setores.map(s=>s.score),
      y: setores.map(s=>s.pct_verde),
      mode:'markers',
      marker:{color:scatterColors, size:scatterSizes, opacity:0.85, line:{width:0}},
      text: setores.map(s=>s.nome),
      hovertemplate:'<b>%{text}</b><br>Score: %{x:.1f}<br>Baixo Risco: %{y:.1f}%<extra></extra>',
    }],{
      ...base, height:220,
      margin:{t:12,b:36,l:44,r:12},
      xaxis:{showgrid:true,gridcolor:getPlotlyColors().grid,color:getPlotlyColors().axis,tickfont:{size:8},
            title:{text:'Score médio',font:{color:getPlotlyColors().axis,size:9}},zeroline:false},
      yaxis:{showgrid:true,gridcolor:getPlotlyColors().grid,color:getPlotlyColors().axis,tickfont:{size:8},
            title:{text:'% Baixo Risco',font:{color:getPlotlyColors().axis,size:9}},zeroline:false},
      showlegend:false,
    },cfg);

    /* Distribuição de faixas de atraso — 5 barras verticais do setor de referência */
    const refFaixas = refData.faixas || {sem:0,baixo:0,moderado:0,alto:0,critico:0};

    const FAIXAS_DEF = [
      { key:'sem',      label:'Sem Atraso',    sublabel:'0 dias',       cor:'#10b981' },
      { key:'baixo',    label:'Baixo',         sublabel:'1–15 dias',    cor:'#6ee7b7' },
      { key:'moderado', label:'Moderado',      sublabel:'16–30 dias',   cor:'#f5c518' },
      { key:'alto',     label:'Alto',          sublabel:'31–60 dias',   cor:'#f59e0b' },
      { key:'critico',  label:'Crítico',       sublabel:'>60 dias',     cor:'#ef4444' },
    ];

    const totalRef = Object.values(refFaixas).reduce((a,b)=>a+b,0)||1;

    Plotly.newPlot('plt-mkt-atraso',[{
      type:'bar',
      x: FAIXAS_DEF.map(f => f.label+'<br>'+f.sublabel),
      y: FAIXAS_DEF.map(f => refFaixas[f.key]||0),
      marker:{color:FAIXAS_DEF.map(f=>f.cor), opacity:.9, line:{width:0}},
      text: FAIXAS_DEF.map(f => {
        const n = refFaixas[f.key]||0;
        const pct = Math.round(n/totalRef*100);
        return n > 0 ? `${n} (${pct}%)` : '0';
      }),
      textposition:'auto',
      textfont:{color:'#eceaf8', size:10, family:'DM Sans'},
      cliponaxis:false,
      hovertemplate:'<b>%{x}</b><br>%{y} empresa(s)<extra></extra>',
    }],{
      ...base, height:200, bargap:.3, showlegend:false,
      margin:{t:16,b:8,l:36,r:16},
      xaxis:{showgrid:false, color:getPlotlyColors().axis, tickfont:{size:9,color:getPlotlyColors().tickfont}, automargin:true},
      yaxis:{showgrid:true, gridcolor:getPlotlyColors().grid, color:getPlotlyColors().axis, tickfont:{size:8}, zeroline:false,
            title:{text:'empresas', font:{color:getPlotlyColors().axis,size:8}}},
      annotations:[],
    }, cfg);
  }

  /* ── Tabela de setores ── */
  function buildMktTable(setores, setorRef) {
    const rows = setores.filter(s => valido(s.nome)).map((s,i) => {
      const isRef = s.nome === setorRef;
      const rowStyle = isRef
        ? 'background:rgba(109,40,217,.1);border-left:2px solid #9d77f5;'
        : '';
      const scoreCor = s.score>=65?'var(--green)':s.score>=40?'var(--amber)':'var(--red)';
      return `<tr style="${rowStyle}cursor:pointer" onclick="mktClickSetor('${s.nome.replace(/'/g,"\'")}')"
        onmouseover="if(!${isRef})this.style.background='var(--bg3)'"
        onmouseout="if(!${isRef})this.style.background='${isRef?'rgba(109,40,217,.1)':''}'">
        <td style="font-weight:700;color:var(--muted2);font-family:var(--mono)">${i+1}</td>
        <td style="font-weight:${isRef?'700':'500'};color:${isRef?'var(--purple2)':'var(--text)'};max-width:180px;white-space:nowrap;overflow-x:hidden; overflow-y:auto;text-overflow:ellipsis">${s.nome}${isRef?' ★':''}</td>
        <td style="font-weight:700;color:${scoreCor};font-family:var(--mono)">${s.score.toFixed(1)}</td>
        <td style="font-family:var(--mono)">${s.cap.toFixed(1)}</td>
        <td style="font-family:var(--mono)">${s.hist.toFixed(1)}</td>
        <td style="font-family:var(--mono)">${s.conc.toFixed(1)}</td>
        <td style="font-family:var(--mono)">${s.atraso.toFixed(1)}d</td>
        <td style="color:${s.pct_verde>=50?'var(--green)':s.pct_verde>=25?'var(--amber)':'var(--red)'};font-family:var(--mono)">${s.pct_verde.toFixed(0)}%</td>
        <td style="color:var(--muted2);font-family:var(--mono)">${s.n}</td>
      </tr>`;
    }).join('');

    return `<table>
      <thead><tr>
        <th>#</th><th>Setor</th><th>Score</th>
        <th>Capac.</th><th>Hist.</th><th>Conc.</th>
        <th>Atraso</th><th>% Verde</th><th>Empresas</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  function mktClickSetor(nome) {
    /* Seleciona o setor na sidebar e vai para a página de Setor */
    const el = document.getElementById('sb-setor');
    if(el) { el.value = nome; onSetorChange(); }
    goPage('setor');
  }

  </script>

<script>
window.addEventListener('error', function(e){
  console.error('Erro capturado:', e.message);
});

document.addEventListener('DOMContentLoaded', () => {
  document.body.style.visibility = 'visible';
});
</script>

</body>
